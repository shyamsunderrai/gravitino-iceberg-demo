# ──────────────────────────────────────────────────────────────────────────────
# Analytical Hive Metastore (AC-HMS) values
#
# Usage:
#   helm install hive-metastore-analytics ./charts/hive-metastore -n gravitino \
#     -f deploy/05-ac-hms-values.yaml
# ──────────────────────────────────────────────────────────────────────────────

hive:
  thriftPort: 9083
  warehouseDir: "s3a://analytical/warehouse"

# SeaweedFS S3 as the object store backend (analytical bucket)
minio:
  accessKey: admin
  secretKey: admin
  endpoint: "http://seaweedfs-filer.gravitino.svc.cluster.local:8333"
  bucket: analytical
  pathStyleAccess: "true"
  sslEnabled: "false"

mysql:
  database: hive_metastore_analytics
  username: hive
  password: changeme
  rootPassword: hiveroot
  image:
    registry: docker.io
    repository: mysql
    tag: "8.4.8-oracle"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

# NodePort 30984 allows external access for debugging (e.g. Beeline)
service:
  type: NodePort
  port: 9083
  nodePort: 30984
