################################################################################
# deploy/09-gravitino-values-spire.yaml
#
# Gravitino Helm values overlay — adds OAuth2 + RBAC on top of the base config
#
# HOW TO APPLY:
#   # Use --reuse-values to preserve existing S3/HMS config, then overlay SPIRE:
#   helm upgrade gravitino ./gravitino -n gravitino \
#     --reuse-values \
#     -f deploy/09-gravitino-values-spire.yaml
#
# WHAT CHANGES FROM THE BASE DEPLOYMENT:
#   This file ONLY sets the authentication and authorization fields.
#   All existing values (icebergRest, persistence, extraVolumes, etc.)
#   are preserved by --reuse-values.
#
# HOW GRAVITINO OAUTH2 + SPIRE WORKS:
#
#   Token validation flow:
#   ──────────────────────
#   1. Workload (Spark pod) fetches JWT-SVID from SPIRE Agent:
#        {"sub": "spiffe://gravitino.demo/spark-oc-writer",
#         "iss": "http://spire-oidc.gravitino.svc.cluster.local:8008",
#         "aud": ["gravitino"], "exp": <now+5min>}
#
#   2. Spark sends to Gravitino: Authorization: Bearer <jwt>
#
#   3. Gravitino's OAuth2 authenticator validates the token:
#        a. Checks "aud" contains serviceAudience ("gravitino") ✓
#        b. Fetches JWKS from serverUri/.well-known/openid-configuration
#           → follows jwks_uri → fetches SPIRE's RS256 public keys
#        c. Verifies JWT signature using those public keys
#        d. Checks "exp" hasn't passed
#        e. Extracts "sub" as the principal identity
#
#   4. Gravitino checks RBAC: is "spiffe://gravitino.demo/spark-oc-writer"
#      authorized for this operation? → looks up roles → evaluates privileges
#
# Helm values reference (from gravitino chart templates/configmap.yaml):
#   gravitino.authenticators          → .Values.authenticators
#   gravitino.authenticator.oauth.*   → .Values.authenticator.oauth.*
#   gravitino.authorization.enable    → .Values.authorization.enable
#   gravitino.authorization.serviceAdmins → .Values.authorization.serviceAdmins
################################################################################

# ── Authentication: switch from "simple" to "oauth" ──────────────────────────
# "simple" (default) = accepts any username string, no verification.
# "oauth"            = validates Bearer JWT against OIDC JWKS endpoint.
#
# Note: the config key is "authenticators" (plural) in Gravitino 1.x
authenticators: oauth

# ── OAuth2 authenticator configuration ───────────────────────────────────────
authenticator:
  oauth:
    # The audience claim Gravitino expects in incoming JWTs.
    # SPIRE issues JWT-SVIDs with "aud": ["gravitino"] (configured in
    # the -audience flag when calling spire-agent api fetch jwt).
    # Gravitino rejects any token whose "aud" doesn't include this value.
    serviceAudience: gravitino

    # The OIDC issuer URL. Gravitino:
    #   1. Fetches http://spire-oidc.../.well-known/openid-configuration
    #   2. Reads the "jwks_uri" from the returned JSON
    #   3. Fetches the JWKS (public keys) from that URI
    #   4. Uses those keys to verify JWT signatures (RS256)
    #
    # This must exactly match the "iss" claim in SPIRE JWT-SVIDs.
    # See jwt_issuer in deploy/06-spire-server.yaml.
    # Must match the SPIRE jwt_issuer and the OIDC discovery doc issuer.
    # SPIRE OIDC Provider always reports "https://" in the discovery doc,
    # so this must use https and no port (even though traffic is HTTP on :8008).
    serverUri: "https://spire-oidc.gravitino.svc.cluster.local"

    # Leave empty — used only for HMAC (HS256) token validation.
    # SPIRE uses RS256 (asymmetric) so the signing key comes from JWKS.
    defaultSignKey: ""

    # The path on serverUri to fetch a token (used for client-credentials
    # flow in some OAuth2 setups). For SPIRE, we don't use this flow —
    # SPIRE issues tokens via its own Workload API. Set to JWKS path
    # so Gravitino can directly fetch keys if needed.
    tokenPath: "/keys"

    # Direct JWKS URI. Points at the SPIRE OIDC Discovery Provider's key endpoint.
    # Uses HTTP on port 8008 (insecure_addr) — bypasses OIDC discovery so
    # Gravitino fetches keys directly without following the https:// jwks_uri
    # from the discovery doc (which would fail since we serve HTTP not HTTPS).
    jwksUri: "http://spire-oidc.gravitino.svc.cluster.local:8008/keys"

    # Provider type hint. Leave empty for custom OIDC (SPIRE).
    provider: ""

    # Not needed for SPIRE integration:
    clientId: ""
    authority: ""
    scope: ""
    tokenValidatorClass: ""

    # The JWT claim to use as the principal (user identity) in Gravitino RBAC.
    # "sub" is the standard SPIFFE claim containing the SPIFFE ID:
    #   "spiffe://gravitino.demo/spark-oc-writer"
    # This string becomes the Gravitino "user" that roles are assigned to.
    principalFields: "sub"

# ── Authorization: enable Gravitino RBAC ────────────────────────────────────
authorization:
  # When true, every authenticated request is checked against RBAC.
  # A user must have an explicit privilege grant to perform any operation.
  enable: true

  # The service admin — bypasses RBAC for admin operations (user/role mgmt).
  # This is the SPIFFE ID of the admin identity we registered in SPIRE.
  # When a request arrives with JWT sub=spiffe://gravitino.demo/admin,
  # it has full administrative access regardless of RBAC rules.
  serviceAdmins: "spiffe://gravitino.demo/admin"

# ── Volume mount for SPIRE Agent socket ─────────────────────────────────────
# Gravitino gets the SPIRE socket so it can request its own SVID if needed
# (for mTLS to HMS in future hardening). Not required for JWT validation
# (which goes over HTTP to the OIDC service).
extraVolumes:
  - name: gravitino-log
    emptyDir: {}
  - name: spire-agent-socket
    hostPath:
      path: /run/spire/sockets
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: gravitino-log
    mountPath: /root/gravitino/logs
  - name: spire-agent-socket
    mountPath: /run/spire/sockets
    readOnly: true
