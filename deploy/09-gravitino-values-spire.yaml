################################################################################
# deploy/09-gravitino-values-spire.yaml
#
# Gravitino Helm values overlay — adds OAuth2 + RBAC on top of the base config
#
# HOW TO APPLY:
#   # Upgrade Gravitino with SPIRE OAuth2 + RBAC (layered on top of base values):
#   helm upgrade gravitino ./gravitino -n gravitino \
#     -f deploy/03-gravitino-values.yaml \
#     -f deploy/09-gravitino-values-spire.yaml
#
#   # The second -f file overrides/extends the first. Helm merges them.
#
# WHAT CHANGES:
#   The base values (03-gravitino-values.yaml) configure the Iceberg REST
#   backend, S3 storage, and HMS connection. This file adds:
#     1. OAuth2 authentication via SPIRE's OIDC endpoint (JWT validation)
#     2. Gravitino authorization (RBAC) enforcement
#
# HOW GRAVITINO OAUTH2 WORKS WITH SPIRE:
#
#   Standard OAuth2 Bearer Token Flow:
#   ────────────────────────────────────
#   1. Workload (Spark pod) asks SPIRE Agent for a JWT-SVID:
#        {"sub": "spiffe://gravitino.demo/spark-oc-writer",
#         "iss": "http://spire-oidc.gravitino.svc.cluster.local:8008",
#         "aud": ["gravitino"],
#         "exp": <5 minutes from now>}
#
#   2. Spark pod sends API request to Gravitino with:
#        Authorization: Bearer <jwt-svid>
#
#   3. Gravitino validates the JWT:
#        a. Reads "iss" claim → "http://spire-oidc.gravitino.svc.cluster.local:8008"
#        b. Fetches http://spire-oidc.../.well-known/openid-configuration
#        c. Gets the "jwks_uri" from that document
#        d. Fetches the JWKS (public keys)
#        e. Verifies the JWT signature using those keys
#        f. Checks "exp" hasn't passed, "aud" includes "gravitino"
#
#   4. Gravitino extracts the "sub" claim as the user identity:
#        sub = "spiffe://gravitino.demo/spark-oc-writer"
#
#   5. Gravitino checks RBAC:
#        Does "spiffe://gravitino.demo/spark-oc-writer" have privilege
#        to perform this operation on this catalog?
#
#   6. If authorized → execute. If not → 403 Forbidden.
#
#   Why this is stronger than static tokens:
#     • JWT-SVIDs expire in 5 minutes → stolen tokens quickly become useless
#     • SPIRE controls who can get a JWT-SVID (workload attestation)
#     • No static passwords or API keys to rotate or leak
#     • Gravitino never stores credentials — it just validates JWTs
################################################################################

# ── OAuth2 Authentication configuration ───────────────────────────────────────
# Tells Gravitino to validate Bearer tokens using SPIRE's OIDC endpoint.
#
# NOTE: The exact Helm values keys depend on the Gravitino Helm chart version.
# For Gravitino 1.x the server config is managed via extraEnv or a custom
# gravitino.conf configmap override. The settings below map to the
# gravitino.conf file entries that Gravitino reads at startup.
#
# Gravitino server config keys (from gravitino.conf reference):
#   gravitino.authenticator          = oauth
#   gravitino.authenticator.oauth.serverUri = <OIDC discovery URL>
#   gravitino.authenticator.oauth.tokenPath = <token validation path>
#   gravitino.authenticator.oauth.defaultSignKey = <JWKS fetch key>
#   gravitino.authenticator.oauth.allowSkewSecs = <clock skew tolerance>
#   gravitino.authorization.enable   = true
#
# We pass these as environment variables that the Gravitino chart injects
# into gravitino.conf via its templating mechanism.

extraEnv:
  # ── Authentication: tell Gravitino to use OAuth2 ──────────────────────────
  - name: GRAVITINO_AUTHENTICATOR
    value: "oauth"

  # The OIDC discovery URL. Gravitino fetches:
  #   GET http://spire-oidc.gravitino.svc.cluster.local:8008/.well-known/openid-configuration
  # and auto-discovers the JWKS endpoint from the returned JSON.
  # This must exactly match the "iss" (issuer) claim in the JWT-SVIDs that
  # SPIRE issues — see jwt_issuer in 06-spire-server.yaml.
  - name: GRAVITINO_AUTHENTICATOR_OAUTH_SERVER_URI
    value: "http://spire-oidc.gravitino.svc.cluster.local:8008"

  # The path within the OIDC server to fetch the JWKS (public keys).
  # Standard OIDC path — the discovery document points here.
  - name: GRAVITINO_AUTHENTICATOR_OAUTH_TOKEN_PATH
    value: "/keys"

  # The audience claim Gravitino expects in incoming JWT-SVIDs.
  # SPIRE will be configured to set "aud: gravitino" in issued JWTs.
  # Gravitino rejects any token whose "aud" doesn't include this value.
  - name: GRAVITINO_AUTHENTICATOR_OAUTH_DEFAULT_SIGN_KEY
    value: "gravitino"

  # Clock skew tolerance in seconds. Allows for small time differences
  # between the SPIRE Server and Gravitino pod clocks. JWT "exp" validation
  # will accept tokens that expired up to 30s ago (accounts for network delay).
  - name: GRAVITINO_AUTHENTICATOR_OAUTH_ALLOW_SKEW_SECS
    value: "30"

  # ── Authorization: enable Gravitino RBAC ──────────────────────────────────
  # When enabled, every API call is checked against the RBAC model:
  #   User (SPIFFE ID) → Role → Privilege → Resource
  # Without this, authentication succeeds but authorization is not enforced
  # (any authenticated user can do anything).
  - name: GRAVITINO_AUTHORIZATION_ENABLE
    value: "true"

# ── Iceberg REST — unchanged from base values ──────────────────────────────────
# We re-declare these here to ensure they're preserved when Helm merges the
# two values files. Helm deep-merges maps, so only changed keys need to be
# specified — but icebergRest is safe to repeat for clarity.
icebergRest:
  classpath: "iceberg-rest-server/libs, iceberg-rest-server/conf"
  catalogBackend: hive
  uri: "thrift://hive-metastore.gravitino.svc.cluster.local:9083"
  warehouse: "s3a://operational/iceberg-warehouse"
  ioImpl: org.apache.iceberg.aws.s3.S3FileIO
  s3:
    accessKeyId: admin
    secretAccessKey: admin
    endpoint: "http://seaweedfs-filer.gravitino.svc.cluster.local:8333"
    pathStyleAccess: "true"
    region: "us-east-1"

# ── Extra volumes: SPIRE Agent socket ─────────────────────────────────────────
# The Gravitino pod needs to talk to the SPIRE Agent for two reasons:
#   1. Gravitino itself can get a SPIFFE identity (spiffe://gravitino.demo/gravitino)
#      for mutual TLS with other SPIFFE-enabled services
#   2. The SPIRE Agent's OIDC endpoint is used by Gravitino to validate JWTs —
#      but this goes via the Service (HTTP), not the socket
#
# The socket mount is included for completeness and future mTLS use.
# It doesn't affect JWT validation, which uses HTTP to the OIDC Service.
extraVolumes:
  - name: gravitino-log
    emptyDir: {}
  - name: spire-agent-socket
    hostPath:
      path: /run/spire/sockets
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: gravitino-log
    mountPath: /root/gravitino/logs
  - name: spire-agent-socket
    mountPath: /run/spire/sockets
    readOnly: true
