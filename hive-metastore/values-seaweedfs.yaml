# ──────────────────────────────────────────────────────────────────────────────
# Hive Metastore 3.1.3 — SeaweedFS values
#
# Deploys a standalone HMS backed by SeaweedFS S3 (instead of HDFS/MinIO).
# All writes go to the "operational" bucket in SeaweedFS.
#
# Sensitive fields (db-password, s3-access-key, s3-secret-key) are stored in
# a Kubernetes Secret and injected as env vars at pod startup — they are never
# written into the ConfigMap in plaintext.
# ──────────────────────────────────────────────────────────────────────────────

## NOTE: Deploy with:
##   helm install hive-metastore ./dev/charts/hive-metastore \
##     -f ./dev/charts/hive-metastore/values-seaweedfs.yaml \
##     --set mysql.image.registry=docker.io \
##     --set mysql.image.repository=mysql \
##     --set mysql.image.tag=8.4.8-oracle \
##     -n gravitino

## S3-compatible storage — SeaweedFS Filer S3 API
## Endpoint uses in-cluster DNS; the NodePort (30334) is for external clients.
##
minio:
  endpoint: "http://seaweedfs-filer.gravitino.svc.cluster.local:8333"
  accessKey: "admin"
  secretKey: "admin"
  bucket: "operational"
  pathStyleAccess: "true"
  sslEnabled: "false"

## Hive Metastore
##
hive:
  thriftPort: 9083
  warehouseDir: "s3a://operational/warehouse"

## MySQL backend — dedicated instance for HMS (separate from Gravitino's MySQL)
##
mysql:
  database: "hive_metastore"
  username: "hive"
  password: "changeme"
  rootPassword: "hiveroot"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

## Expose Thrift via NodePort so external clients (Spark, Trino, etc.) can connect
##
service:
  type: NodePort
  port: 9083
  nodePort: 30983
