apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hive-metastore.fullname" . }}-mysql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hive-metastore.labels" . | nindent 4 }}
    component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "hive-metastore.name" . }}-mysql
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "hive-metastore.name" . }}-mysql
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: mysql
          image: {{ include "hive-metastore.mysqlImage" . }}
          imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hive-metastore.secretName" . }}
                  key: db-root-password
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database | quote }}
            - name: MYSQL_USER
              value: {{ .Values.mysql.username | quote }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hive-metastore.secretName" . }}
                  key: db-password
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: mysql-data
              mountPath: {{ .Values.mysql.persistence.mountPath | default "/var/lib/mysql" }}
      volumes:
        - name: mysql-data
          {{- if .Values.mysql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hive-metastore.fullname" . }}-mysql-data
          {{- else }}
          emptyDir: {}
          {{- end }}
