apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hive-metastore.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hive-metastore.labels" . | nindent 4 }}
data:
  # ── core-site.xml ────────────────────────────────────────────────────────────
  # Hadoop filesystem configuration.  S3AFileSystem is registered here so that
  # any s3a:// URI (warehouse path, table LOCATION, etc.) is routed to MinIO.
  core-site.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>

      <!-- ── S3A → MinIO ── -->
      <property>
        <name>fs.s3a.impl</name>
        <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
      </property>
      <property>
        <name>fs.AbstractFileSystem.s3a.impl</name>
        <value>org.apache.hadoop.fs.s3a.S3A</value>
      </property>
      <property>
        <name>fs.s3a.endpoint</name>
        <value>{{ .Values.minio.endpoint }}</value>
      </property>
      <property>
        <name>fs.s3a.access.key</name>
        <value>${S3_ACCESS_KEY}</value>
      </property>
      <property>
        <name>fs.s3a.secret.key</name>
        <value>${S3_SECRET_KEY}</value>
      </property>
      <!-- MinIO requires path-style access; virtual-hosted-style is not supported -->
      <property>
        <name>fs.s3a.path.style.access</name>
        <value>{{ .Values.minio.pathStyleAccess }}</value>
      </property>
      <property>
        <name>fs.s3a.connection.ssl.enabled</name>
        <value>{{ .Values.minio.sslEnabled }}</value>
      </property>
      <!-- Faster connection checks; MinIO responds quickly on the local network -->
      <property>
        <name>fs.s3a.connection.establish.timeout</name>
        <value>5000</value>
      </property>
      <property>
        <name>fs.s3a.connection.timeout</name>
        <value>10000</value>
      </property>

    </configuration>

  # ── hive-site.xml ────────────────────────────────────────────────────────────
  hive-site.xml: |
    <?xml version="1.0" encoding="UTF-8" standalone="no"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>

      <!-- ── MySQL metastore backend ── -->
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>com.mysql.cj.jdbc.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:mysql://{{ include "hive-metastore.mysqlHost" . }}:3306/{{ .Values.mysql.database }}?createDatabaseIfNotExist=true&amp;useSSL=false&amp;allowPublicKeyRetrieval=true&amp;serverTimezone=UTC</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>{{ .Values.mysql.username }}</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>${DB_PASSWORD}</value>
      </property>

      <!-- ── Schema management ── -->
      <property>
        <name>datanucleus.schema.autoCreateAll</name>
        <value>false</value>
      </property>
      <property>
        <name>datanucleus.schema.validateTables</name>
        <value>false</value>
      </property>
      <property>
        <name>datanucleus.schema.validateColumns</name>
        <value>false</value>
      </property>

      <!-- ── Metastore server ── -->
      <property>
        <name>hive.metastore.uris</name>
        <value>thrift://0.0.0.0:{{ .Values.hive.thriftPort }}</value>
      </property>
      <!-- Warehouse root lives in MinIO; HMS will create the s3a:// path on first use -->
      <property>
        <name>hive.metastore.warehouse.dir</name>
        <value>{{ .Values.hive.warehouseDir }}</value>
      </property>
      <property>
        <name>hive.metastore.event.db.notification.api.auth</name>
        <value>false</value>
      </property>

      {{- range $k, $v := .Values.hive.extraSiteXml }}
      <property>
        <name>{{ $k }}</name>
        <value>{{ $v }}</value>
      </property>
      {{- end }}

    </configuration>

  # ── init.sh — main container startup ─────────────────────────────────────────
  init.sh: |
    #!/bin/bash
    set -e

    HADOOP_HOME="${HADOOP_HOME:-/opt/hadoop}"

    # Substitute secret env vars into XML configs at runtime.
    # Credentials are injected as env vars from a Kubernetes Secret so that
    # they are never stored as plaintext in the ConfigMap.
    mkdir -p /tmp/conf-resolved
    for f in /tmp/conf/core-site.xml /tmp/conf/hive-site.xml; do
      sed \
        -e "s|\${DB_PASSWORD}|${DB_PASSWORD}|g" \
        -e "s|\${S3_ACCESS_KEY}|${S3_ACCESS_KEY}|g" \
        -e "s|\${S3_SECRET_KEY}|${S3_SECRET_KEY}|g" \
        "$f" > "/tmp/conf-resolved/$(basename $f)"
    done

    # HIVE_AUX_JARS_PATH is sourced by all Hive startup scripts (hive-config.sh)
    # and adds the listed directory to the classpath without requiring write
    # access to /opt/hive/lib/.
    export HIVE_AUX_JARS_PATH="/extra-jars"

    # Add Hadoop S3A jars (hadoop-aws + aws-java-sdk-bundle) to the classpath.
    export HADOOP_CLASSPATH="${HADOOP_HOME}/share/hadoop/tools/lib/*"
    export HADOOP_CONF_DIR="/tmp/conf-resolved"
    export HIVE_CONF_DIR="/tmp/conf-resolved"

    echo "Extra jars: $(ls /extra-jars/)"
    echo "Starting Hive Metastore (warehouse: {{ .Values.hive.warehouseDir }})..."
    exec "${HIVE_HOME}/bin/hive" --service metastore

  # ── init-schema.sh — schema init container ───────────────────────────────────
  init-schema.sh: |
    #!/bin/bash
    set -e

    HADOOP_HOME="${HADOOP_HOME:-/opt/hadoop}"

    # Substitute secret env vars into XML configs at runtime.
    mkdir -p /tmp/conf-resolved
    for f in /tmp/conf/core-site.xml /tmp/conf/hive-site.xml; do
      sed \
        -e "s|\${DB_PASSWORD}|${DB_PASSWORD}|g" \
        -e "s|\${S3_ACCESS_KEY}|${S3_ACCESS_KEY}|g" \
        -e "s|\${S3_SECRET_KEY}|${S3_SECRET_KEY}|g" \
        "$f" > "/tmp/conf-resolved/$(basename $f)"
    done

    export HIVE_AUX_JARS_PATH="/extra-jars"
    export HADOOP_CLASSPATH="${HADOOP_HOME}/share/hadoop/tools/lib/*"
    export HADOOP_CONF_DIR="/tmp/conf-resolved"
    export HIVE_CONF_DIR="/tmp/conf-resolved"

    echo "Waiting for MySQL at {{ include "hive-metastore.mysqlHost" . }}:3306 ..."
    until bash -c "echo > /dev/tcp/{{ include "hive-metastore.mysqlHost" . }}/3306" 2>/dev/null; do
      echo "  MySQL not ready, retrying in 3s..."
      sleep 3
    done
    # Give MySQL a few extra seconds to finish initialising its grant tables
    sleep 5
    echo "MySQL is ready."

    echo "Initialising Hive schema (safe to ignore errors if schema already exists)..."
    "${HIVE_HOME}/bin/schematool" -dbType mysql -initSchema \
      --verbose 2>&1 | grep -v "^$" || true

    echo "Schema init complete."
