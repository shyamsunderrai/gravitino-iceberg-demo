# ─────────────────────────────────────────────────────────────────────────────
# Hive Metastore A — Operational Cluster
#
# Represents the production/operational metastore that teams write new
# objects into.  All objects created here are exposed to Hive Metastore B
# users via Gravitino without any out-of-band synchronisation.
#
# Install with:
#   helm install hive-metastore-a ../../hive-metastore \
#     -f hive-metastore-a-values.yaml
#
# The fullnameOverride pins the Kubernetes service name to "hive-metastore-a"
# so that the setup-catalogs Job can reference it by a known hostname.
# ─────────────────────────────────────────────────────────────────────────────

fullnameOverride: "hive-metastore-a"

# ── MySQL instance #2 of 3 (operational metastore backend) ───────────────────
# Docker Desktop's default storage class is "hostpath"; leave storageClass
# empty to use whatever the cluster default is, or set it explicitly.
mysql:
  database: hive_operational
  username: hive
  password: hive
  rootPassword: hiveroot
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""   # set to "hostpath" if Docker Desktop does not pick it up

# ── MinIO — warehouse storage (secureagent namespace) ────────────────────────
# Adjust endpoint/credentials to match your MinIO deployment.
# The bucket "hive-operational" will be created by the setup-catalogs Job.
minio:
  endpoint: "http://minio.secureagent.svc.cluster.local:9000"
  accessKey: "admin"
  secretKey: "password"
  bucket: "hive-operational"
  pathStyleAccess: "true"
  sslEnabled: "false"

# ── Hive configuration ────────────────────────────────────────────────────────
hive:
  warehouseDir: "s3a://hive-operational/warehouse"
  thriftPort: 9083
