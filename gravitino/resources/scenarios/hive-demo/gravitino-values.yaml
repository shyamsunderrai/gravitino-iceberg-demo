# ─────────────────────────────────────────────────────────────────────────────
# Gravitino values for the Hive Federation Demo
#
# Install with:
#   helm dependency update ./gravitino
#   helm install gravitino ./gravitino \
#     -f ./gravitino/resources/scenarios/hive-demo/gravitino-values.yaml
#
# The release name MUST be "gravitino" so that the MySQL service resolves to
# "gravitino-mysql" and the setup-catalogs Job can reach the server at
# "gravitino:8090" without extra configuration.
# ─────────────────────────────────────────────────────────────────────────────

# ── Image — override chart default (1.3.0-SNAPSHOT not published to Docker Hub) ─
image:
  tag: "1.2.0-rc11"

# ── MySQL entity store (instance #1 of 3) ────────────────────────────────────
mysql:
  enabled: true
  auth:
    rootPassword: "gravitino"
    createDatabase: true
    database: gravitino
    username: gravitino
    password: gravitino

# ── Point Gravitino's entity store at the bitnami MySQL subchart ─────────────
entity:
  jdbcUrl: "jdbc:mysql://gravitino-mysql:3306/gravitino?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  jdbcDriver: "com.mysql.cj.jdbc.Driver"
  jdbcUser: "gravitino"
  jdbcPassword: "gravitino"
  storagePath: /root/gravitino/data/jdbc

# ── Persistence — backed by a pre-created PVC (gravitino-pvc.yaml) ────────────
# The chart has no auto-PVC template; existingClaim must reference a PVC that
# already exists in the namespace before helm install runs.
persistence:
  enabled: true
  existingClaim: gravitino-storage

# ── Expose Gravitino as NodePort so you can reach the UI from your laptop ────
# Change to ClusterIP if you only need in-cluster access.
service:
  name: gravitino
  type: NodePort
  port: 8090
  targetPort: 8090
  nodePort: ""        # leave empty for auto-assignment, or set e.g. 30090

# ── Disable the Iceberg REST auxiliary service (not needed for this demo) ─────
auxService:
  names: ""

# ── Give Gravitino enough memory to hold catalog metadata comfortably ─────────
env:
  - name: GRAVITINO_HOME
    value: /root/gravitino
  - name: GRAVITINO_MEM
    value: "-Xms512m -Xmx1024m -XX:MaxMetaspaceSize=256m"

# ── Enable console logging so kubectl logs is useful during the demo ──────────
additionalLog4j2Properties:
  appender.console.type: Console
  appender.console.name: consoleLogger
  appender.console.layout.type: PatternLayout
  appender.console.layout.pattern: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1}:%L - %m%n"
  rootLogger.appenderRef.console.ref: consoleLogger
