# ─────────────────────────────────────────────────────────────────────────────
# Hive Metastore B — Analytical Cluster
#
# Represents the analytical/reporting metastore.  Via Gravitino, users on
# this cluster can browse objects that only exist in the operational
# metastore (HMS A), and can replicate or create new objects in HMS B
# without any direct cross-metastore configuration.
#
# Install with:
#   helm install hive-metastore-b ../../hive-metastore \
#     -f hive-metastore-b-values.yaml
#
# The fullnameOverride pins the Kubernetes service name to "hive-metastore-b".
# ─────────────────────────────────────────────────────────────────────────────

fullnameOverride: "hive-metastore-b"

# ── MySQL instance #3 of 3 (analytical metastore backend) ────────────────────
mysql:
  database: hive_analytical
  username: hive
  password: hive
  rootPassword: hiveroot
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""   # set to "hostpath" if Docker Desktop does not pick it up

# ── MinIO — warehouse storage (secureagent namespace) ────────────────────────
# HMS B gets its own isolated bucket so analytical writes are separate from
# operational data, mirroring a real multi-cluster setup.
minio:
  endpoint: "http://minio.secureagent.svc.cluster.local:9000"
  accessKey: "admin"
  secretKey: "password"
  bucket: "hive-analytical"
  pathStyleAccess: "true"
  sslEnabled: "false"

# ── Hive configuration ────────────────────────────────────────────────────────
hive:
  warehouseDir: "s3a://hive-analytical/warehouse"
  thriftPort: 9083
